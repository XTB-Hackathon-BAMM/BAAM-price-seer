services:
  postgres:
    image: postgres:16-alpine
    container_name: baam-postgres
    network_mode: host
    environment:
      POSTGRES_DB: priceseer
      POSTGRES_USER: priceseer
      POSTGRES_PASSWORD: priceseer
      PGPORT: 15432
    volumes:
      - baam-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U priceseer -d priceseer -p 15432"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  baam-pgdata:
